<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merluciuman - Chapter 14</title>

<style>

body{
    margin:0;
    background:#111827;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

h1{
    text-align:center;
    margin:20px;
}

.container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:30px;
    padding:20px;
    flex-wrap:wrap;
}

.panel{
    text-align:center;
}

.panel img{
    width:420px;
    max-width:100%;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 15px rgba(0,0,0,.6);
    transition:.2s;
}

.panel img:hover{
    transform:scale(1.02);
}

.caption{
    margin-top:12px;
    font-size:18px;
}

/* ---------- Navigation ---------- */

.nav-arrow{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    width:60px;
    height:60px;
    background:#1f6feb;
    color:white;
    text-decoration:none;
    font-size:36px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    box-shadow:0 0 15px rgba(0,0,0,.6);
    transition:.2s;
    z-index:999;
}

.nav-arrow:hover{
    background:#388bfd;
    transform:translateY(-50%) scale(1.1);
}

.nav-left{
    left:20px;
}

.nav-right{
    right:20px;
}

/* ---------- Lightbox ---------- */

#lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.97);
    overflow:auto;
    z-index:9999;
}

#lightboxContent{
    width:max-content;
    margin:auto;
    padding:40px;
}

#lightbox img{
    display:block;
    width:1400px;
    max-width:none;
    height:auto;
    border-radius:8px;
    box-shadow:0 0 40px rgba(0,0,0,.9);
}

#close{
    position:fixed;
    top:20px;
    right:30px;
    color:white;
    font-size:52px;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
    z-index:10000;
}

</style>

</head>

<body>

<a href="Chapter13.html" class="nav-arrow nav-left">&#10094;</a>
<a href="Chapter15.html" class="nav-arrow nav-right">&#10095;</a>

<h1>Chapter 14</h1>

<div class="container">

    <div class="panel">
        <img src="MC_27.png" alt="Cover" onclick="openImage(this.src)">
        <div class="caption">Cover</div>
    </div>

    <div class="panel">
        <img src="MC_28.png" alt="Comic Page" onclick="openImage(this.src)">
        <div class="caption">Page 1</div>
    </div>

</div>

<div id="lightbox" onclick="closeImage()">

    <span id="close">&times;</span>

    <div id="lightboxContent">
        <img id="lightboxImage">
    </div>

</div>

<script>

const lightbox = document.getElementById("lightbox");
const lightboxImage = document.getElementById("lightboxImage");

function openImage(src){

    lightboxImage.src = src;
    lightbox.style.display = "block";

    lightbox.scrollTop = 0;
    lightbox.scrollLeft = 0;
}

function closeImage(){

    lightbox.style.display = "none";
}

document.addEventListener("keydown", function(e){

    if(e.key === "Escape")
        closeImage();

    if(e.key === "ArrowLeft")
        window.location.href = "Chapter1.html";

    if(e.key === "ArrowRight")
        window.location.href = "Chapter3.html";

});

lightboxImage.addEventListener("click", function(e){

    e.stopPropagation();

});

</script>

</body>
</html>

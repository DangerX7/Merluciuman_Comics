<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merluciuman - Chapter 1</title>

<style>

body{
    margin:0;
    background:#111827;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

h1{
    text-align:center;
    margin:20px;
}

.container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:30px;
    padding:20px;
}

.panel{
    text-align:center;
}

.panel img{
    width:420px;
    max-width:100%;
    border-radius:10px;
    cursor:pointer;
    transition:0.25s;
    box-shadow:0 0 15px rgba(0,0,0,.6);
}

.zoomed{
    width:900px !important;
}

.caption{
    margin-top:12px;
    font-size:18px;
}

</style>

</head>

<body>

<h1>Chapter 1</h1>

<div class="container">

<div class="panel">
<img src="MC_01.jpg" alt="Cover" onclick="toggleZoom(this)">
<div class="caption">Cover</div>
</div>

<div class="panel">
<img src="MC_02.jpg" alt="Comic Page" onclick="toggleZoom(this)">
<div class="caption">Page 1</div>
</div>

</div>

<script>

function toggleZoom(img){

    img.classList.toggle("zoomed");

}

</script>

</body>
</html>
